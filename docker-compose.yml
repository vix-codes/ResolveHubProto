version: '3.8'

services:

  mongo:
    image: mongo:7
    container_name: resolvehub-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - resolvehub-net

  backend:
    build: ./backend
    container_name: resolvehub-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/resolvehub
      JWT_SECRET: resolvehubsecret2024
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - mongo
    networks:
      - resolvehub-net

  frontend:
    build: ./frontend
    container_name: resolvehub-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - resolvehub-net

volumes:
  mongo_data:

networks:
  resolvehub-net:
    driver: bridge
